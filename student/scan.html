<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan QR - AMS</title>

  <!-- html5-qrcode CDN -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
    #reader { width: 300px; margin: 20px auto; border-radius: 12px; overflow: hidden; }
    #status { margin-top: 16px; font-size: 15px; color: #333; }
    .success { color: green; font-weight: bold; }
    .error   { color: red; font-weight: bold; }
  </style>
</head>
<body>

  <h2>Scan Attendance QR Code</h2>
  <p id="status">Point your camera at the QR code shown by faculty.</p>
  <div id="reader"></div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    let currentStudent = null;

    // Check student is logged in
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = '../index.html';
      } else {
        currentStudent = user;
        startScanner();
      }
    });

    function startScanner() {
      const html5QrCode = new Html5Qrcode("reader");

      html5QrCode.start(
        { facingMode: "environment" },  // back camera
        { fps: 10, qrbox: { width: 250, height: 250 } },

        async (decodedText) => {
          // QR scanned successfully
          html5QrCode.stop(); // Stop camera

          document.getElementById('status').textContent = 'QR scanned! Validating...';

          await validateQR(decodedText);
        },

        (errorMessage) => {
          // Scan errors are normal — ignore them
        }
      ).catch((err) => {
        document.getElementById('status').innerHTML =
          '<span class="error">Camera access denied. Please allow camera in browser settings.</span>';
      });
    }

    async function validateQR(decodedText) {
      try {
        // Parse QR data (JSON string from faculty)
        const qrData = JSON.parse(decodedText);

        // Check session exists in Firestore
        const sessionRef = doc(db, 'sessions', qrData.sessionId);
        const sessionSnap = await getDoc(sessionRef);

        if (!sessionSnap.exists()) {
          showError('Invalid QR code. Session not found.');
          return;
        }

        const session = sessionSnap.data();

        // Check QR expiry
        const now = Date.now();
        if (now > session.expiresAt) {
          showError('QR code has expired. Ask faculty to regenerate.');
          return;
        }

        // Check session is still active
        if (session.status !== 'active') {
          showError('This session is no longer active.');
          return;
        }

        // QR valid — save session data and go to fingerprint
        sessionStorage.setItem('validatedSession', JSON.stringify({
          sessionId: qrData.sessionId,
          courseId: session.courseId,
          facultyId: session.facultyId,
          courseName: session.courseName
        }));

        document.getElementById('status').innerHTML =
          '<span class="success">QR Valid! Proceeding to fingerprint...</span>';

        // Redirect to fingerprint page after 1 second
        setTimeout(() => {
          window.location.href = 'fingerprint.html';
        }, 1000);

      } catch (e) {
        showError('Invalid QR data format.');
      }
    }

    function showError(msg) {
      document.getElementById('status').innerHTML =
        `<span class="error">${msg}</span><br><button onclick="location.reload()">Try Again</button>`;
    }
  </script>

</body>
</html>
