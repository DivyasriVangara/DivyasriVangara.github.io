<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fingerprint Verification</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f3f4f6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  .icon {
    font-size: 56px;
    margin-bottom: 12px;
  }
  h1 { font-size: 18px; margin: 0 0 8px; color: #1f2937; }
  p { font-size: 14px; color: #6b7280; margin: 0 0 24px; line-height: 1.5; }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
  }
  button:disabled { background: #a5a6f3; cursor: not-allowed; }
  button.secondary { background: #e5e7eb; color: #374151; }
  #msg {
    margin-top: 14px;
    font-size: 13px;
    min-height: 18px;
  }
  #msg.error { color: #dc2626; }
  #msg.success { color: #16a34a; }
</style>
</head>
<body>

  <div class="card">
    <div class="icon" id="icon">🔒</div>
    <h1 id="title">Verifying your identity...</h1>
    <p id="subtitle">Use your fingerprint to confirm attendance.</p>

    <button id="action-btn">Scan Fingerprint</button>
    <button id="cancel-btn" class="secondary">Cancel</button>
    <div id="msg"></div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, setDoc, onAuthStateChanged } from "../js/firebase-config.js";
    import { registerFingerprint, verifyFingerprint } from "../js/fingerprint.js";
    import { markAttendance } from "../js/attendance.js";

    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const actionBtn = document.getElementById("action-btn");
    const cancelBtn = document.getElementById("cancel-btn");
    const msg = document.getElementById("msg");
    const icon = document.getElementById("icon");

    const qrPayload = sessionStorage.getItem("qrPayload");

    if (!qrPayload) {
      title.textContent = "No QR scan found";
      subtitle.textContent = "Please scan the attendance QR code first.";
      actionBtn.style.display = "none";
    }

    cancelBtn.addEventListener("click", () => {
      sessionStorage.removeItem("qrPayload");
      window.location.href = "dashboard.html";
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "../index.html";
        return;
      }

      actionBtn.addEventListener("click", async () => {
        actionBtn.disabled = true;
        msg.className = "";
        msg.textContent = "";

        try {
          const userDocRef = doc(db, "students", user.uid);
          const userDocSnap = await getDoc(userDocRef);
          const studentData = userDocSnap.exists() ? userDocSnap.data() : null;

          if (!studentData || !studentData.credentialId) {
            // First-time setup: register fingerprint
            title.textContent = "Set up your fingerprint";
            subtitle.textContent = "This is your first time. Follow your device's prompt.";
            actionBtn.textContent = "Setting up...";

            const { credentialId } = await registerFingerprint(user.uid, user.email);
            await setDoc(userDocRef, { credentialId, email: user.email }, { merge: true });

            msg.className = "success";
            msg.textContent = "Fingerprint registered! Now verifying attendance...";
          }

          // Re-fetch in case we just registered
          const refreshedSnap = await getDoc(userDocRef);
          const credentialId = refreshedSnap.data().credentialId;

          title.textContent = "Confirm with your fingerprint";
          subtitle.textContent = "Follow your device's prompt now.";
          actionBtn.textContent = "Verifying...";

          await verifyFingerprint(credentialId);

          icon.textContent = "✅";
          title.textContent = "Fingerprint verified!";
          subtitle.textContent = "Saving your attendance...";

          await markAttendance({
            studentId: user.uid,
            studentEmail: user.email,
            qrPayload
          });

          sessionStorage.removeItem("qrPayload");
          msg.className = "success";
          msg.textContent = "Attendance marked successfully!";
          actionBtn.style.display = "none";
          cancelBtn.textContent = "Back to Dashboard";

        } catch (err) {
          console.error(err);
          icon.textContent = "❌";
          msg.className = "error";
          msg.textContent = err.message || "Verification failed. Try again.";
          actionBtn.disabled = false;
          actionBtn.textContent = "Try Again";
        }
      });
    });
  </script>

</body>
</html>
