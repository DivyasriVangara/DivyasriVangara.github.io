<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Dashboard</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f3f4f6;
    min-height: 100vh;
  }
  header {
    background: #4f46e5;
    color: #fff;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { margin: 0; font-size: 18px; }
  #logout-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  main { padding: 24px 20px; max-width: 480px; margin: 0 auto; }

  .scan-card {
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    margin-bottom: 24px;
  }
  .scan-card .emoji { font-size: 44px; margin-bottom: 10px; }
  .scan-card h2 { margin: 0 0 6px; font-size: 17px; color: #1f2937; }
  .scan-card p { margin: 0 0 18px; font-size: 13px; color: #6b7280; }
  .scan-btn {
    display: inline-block;
    background: #4f46e5;
    color: #fff;
    padding: 12px 28px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
  }

  .history h3 { font-size: 14px; color: #374151; margin-bottom: 10px; }
  .record {
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    font-size: 13px;
    color: #374151;
    display: flex;
    justify-content: space-between;
  }
  .record span.date { color: #9ca3af; }
  #empty-state { font-size: 13px; color: #9ca3af; text-align: center; padding: 20px 0; }
</style>
</head>
<body>

  <header>
    <h1>👋 Welcome<span id="user-email"></span></h1>
    <button id="logout-btn">Log Out</button>
  </header>

  <main>
    <div class="scan-card">
      <div class="emoji">📱</div>
      <h2>Mark Today's Attendance</h2>
      <p>Scan the QR code shown by your teacher, then confirm with your fingerprint.</p>
      <a href="scan.html" class="scan-btn">Scan QR Code</a>
    </div>

    <div class="history">
      <h3>Recent Attendance</h3>
      <div id="record-list">
        <div id="empty-state">Loading...</div>
      </div>
    </div>
  </main>

  <script type="module">
    import {
      auth, db, onAuthStateChanged, signOut,
      collection, query, where, getDocs
    } from "../js/firebase-config.js";

    const userEmailEl = document.getElementById("user-email");
    const recordList = document.getElementById("record-list");
    const logoutBtn = document.getElementById("logout-btn");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "../index.html";
        return;
      }
      userEmailEl.textContent = ", " + user.email;

      try {
        const q = query(collection(db, "attendance"), where("studentId", "==", user.uid));
        const snap = await getDocs(q);

        if (snap.empty) {
          recordList.innerHTML = `<div id="empty-state">No attendance records yet.</div>`;
          return;
        }

        const records = [];
        snap.forEach((d) => records.push(d.data()));
        records.sort((a, b) => (b.date || "").localeCompare(a.date || ""));

        recordList.innerHTML = records
          .slice(0, 10)
          .map(
            (r) => `
            <div class="record">
              <span>${r.session || "Session"}</span>
              <span class="date">${r.date || ""}</span>
            </div>`
          )
          .join("");
      } catch (err) {
        console.error(err);
        recordList.innerHTML = `<div id="empty-state">Could not load attendance history.</div>`;
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "../index.html";
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("../sw.js").catch(console.error);
    }
  </script>

</body>
</html>
